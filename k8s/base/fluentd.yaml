apiVersion: v1
kind: ConfigMap
metadata:
  name: fluentd-config
  namespace: ai-platform
data:
  fluent.conf: |
    <source>
      @type tail
      path /var/log/containers/*.log
      pos_file /tmp/fluentd-containers.log.pos
      tag kube.*
      format json
      read_from_head true
    </source>

    <match kube.*>
      @type stdout
    </match>

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentd
  namespace: ai-platform
spec:
  selector:
    matchLabels:
      app: fluentd
  template:
    metadata:
      labels:
        app: fluentd
    spec:
      containers:
        - name: fluentd
          image: fluent/fluentd:v1.16-debian
          env:
            - name: FLUENT_ELASTICSEARCH_HOST
              value: "elasticsearch-master"
            - name: FLUENT_ELASTICSEARCH_PORT
              value: "9200"
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: config
              mountPath: /fluentd/etc
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: config
          configMap:
            name: fluentd-config