apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: node-app
  namespace: node-app
spec:
  podSelector:
    matchLabels:
      app: node-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53